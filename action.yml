name: "Kyverno Policy Validator"
description: "Validate Kubernetes manifests using Kyverno policies with rich GitHub annotations and security reporting."
author: "Ananta Cloud"

branding:
  icon: "shield"
  color: "blue"

inputs:
  policies:
    required: true
    description: "Path or OCI URI to policies"
  resources:
    required: true
    description: "Kubernetes manifests path"
  helm-chart:
    required: false
    description: "Helm chart path"
  helm-values:
    required: false
    description: "Helm values file"
  kustomize-path:
    required: false
    description: "Kustomize overlay path"
  policy-exceptions:
    required: false
    description: "Path to policy exceptions"
  severity:
    required: false
    default: "low,medium,high,critical"
    description: "Severity filter"
  output-format:
    required: false
    default: "table"
  sarif:
    required: false
    default: "true"
  junit:
    required: false
    default: "true"
  pr-comment:
    required: false
    default: "true"
  diff-mode:
    required: false
    default: "false"
  kyverno-version:
    required: false
    default: "v1.15.0"
  slack-webhook:
    description: "Slack webhook URL for notifications"
    required: false
  teams-webhook:
    description: "Microsoft Teams webhook URL for notifications"
    required: false
  gchat-webhook:
    description: "Google Chat webhook URL for notifications"
    required: false
  notify-on:
    description: "When to send notifications: always, failure, success"
    required: false
    default: "failure"
  github-token:
    description: "GitHub token for PR comments and API access"
    required: false
    default: ${{ github.token }}

outputs:
  violations:
    description: "Total violations detected"
  status:
    description: "Validation status"
  sarif-report:
    description: "SARIF report location"
  junit-report:
    description: "JUnit report location"

runs:
  using: "node20"
  main: "dist/index.js"
